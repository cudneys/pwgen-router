apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwgen-router
  labels:
    app.kubernetes.io/name: pwgen-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pwgen-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pwgen-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pwgen-router
          image: ghcr.io/cudneys/pwgen-router:0.0.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: GIN_MODE
              value: "release"
            - name: CHAR_SERVICE
              value: "http://char/generate"
            - name: SYMBOL_SERVICE
              value: "http://symbol/generate"
            - name: UPPERCASE_SERVICE
              value: "http://uppercase/generate"
            - name: NUMBER_SERVICE
              value: "http://number/generate"
            # OpenTelemetry — point at your collector (OTLP/gRPC).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://lee-trace-ingest.apporto.com:443"
            - name: OTEL_SERVICE_NAME
              value: "router"
            - name: OTEL_EXPORTER_OTLP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-bearer-token
                  key: token
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME)"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
